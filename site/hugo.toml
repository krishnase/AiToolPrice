baseURL = "https://aitoolprice.com"
languageCode = "en-us"
title = "AI Tool Price — Compare AI Tool Pricing"
theme = "PaperMod"

[pagination]
  pagerSize = 12

[params]
  description = "Compare AI tool pricing side by side. Track ChatGPT, Claude, Jasper, Grammarly and more — updated daily."
  author = "AI Tool Price"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  hideFooter = false
  disableThemeToggle = false
  env = "production"

[params.label]
  text = "💰 AI Tool Price"

[menu]
  [[menu.main]]
    name   = "Articles"
    url    = "/articles/"
    weight = 1
  [[menu.main]]
    name   = "Compare"
    url    = "/compare/"
    weight = 2
  [[menu.main]]
    name   = "🔍 Find My Tool"
    url    = "/#finder-q1"
    weight = 3
    [menu.main.params]
      class = "nav-cta"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "github"

[outputs]
  home = ["HTML", "RSS", "JSON"]
