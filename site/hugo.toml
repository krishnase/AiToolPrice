baseURL = "https://aitoolprice.com"
languageCode = "en-us"
title = "AI Tool Price — Compare AI Tool Pricing"
theme = "PaperMod"

[pagination]
  pagerSize = 12

[params]
  description = "Compare AI tool pricing side by side. Track ChatGPT, Claude, Jasper, Grammarly and more — updated daily."
  author = "AI Tool Price"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  hideFooter = false
  disableThemeToggle = false
  env = "production"

[params.label]
  text = "AI Tool Price"
  icon = "/logo.svg"
  iconHeight = 32
  iconWidth = 36

[menu]
  [[menu.main]]
    name   = "Articles"
    url    = "/articles/"
    weight = 1
  [[menu.main]]
    name   = "Compare"
    url    = "/compare/"
    weight = 2
  [[menu.main]]
    name   = "Find My Tool"
    url    = "/#finder-q1"
    weight = 3
    [menu.main.params]
      class = "nav-cta"

  # Footer navigation — required for AdSense approval
  [[menu.footer]]
    name   = "About"
    url    = "/about/"
    weight = 1
  [[menu.footer]]
    name   = "Contact"
    url    = "/contact/"
    weight = 2
  [[menu.footer]]
    name   = "Privacy Policy"
    url    = "/privacy-policy/"
    weight = 3
  [[menu.footer]]
    name   = "Terms & Conditions"
    url    = "/terms/"
    weight = 4

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "github"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "daily"
  priority   = 0.5
  filename   = "sitemap.xml"

[params.schema]
  publisherType = "Organization"
