name: Daily pipeline + deploy

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary requests beautifulsoup4 anthropic python-dotenv

      - name: Create .env
        run: |
          cat > .env << ENVEOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SITE_OUTPUT_DIR=./site/content/articles
          SITE_BASE_URL=https://aitoolprice.com
          SITE_NAME=AI Tool Price
          LOG_LEVEL=INFO
          LOG_FILE=pipeline.log
          ENVEOF

      - name: Run pipeline
        run: python run.py

      - name: Commit articles
        run: |
          git config user.name "AiToolPrice Bot"
          git config user.email "bot@aitoolprice.com"
          git add site/content/articles/
          git diff --staged --quiet || git commit -m "auto: daily update $(date +%Y-%m-%d)"
          git push

